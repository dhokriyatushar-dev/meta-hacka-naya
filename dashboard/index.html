<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduPath AI — Training Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0e17;
            --bg-secondary: #111827;
            --bg-card: #1a1f2e;
            --border: #2a3042;
            --text-primary: #e5e7eb;
            --text-secondary: #9ca3af;
            --accent-blue: #3b82f6;
            --accent-purple: #8b5cf6;
            --accent-green: #10b981;
            --accent-orange: #f59e0b;
            --accent-red: #ef4444;
            --accent-pink: #ec4899;
            --gradient-1: linear-gradient(135deg, #3b82f6, #8b5cf6);
            --gradient-2: linear-gradient(135deg, #10b981, #3b82f6);
            --gradient-3: linear-gradient(135deg, #f59e0b, #ef4444);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }

        .header {
            background: linear-gradient(135deg, rgba(59,130,246,0.15), rgba(139,92,246,0.15));
            border-bottom: 1px solid var(--border);
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(20px);
        }

        .header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header .status {
            font-size: 0.85rem;
            color: var(--accent-green);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .header .status::before {
            content: '';
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent-green);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1.5rem;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        }

        .card.full-width {
            grid-column: 1 / -1;
        }

        .card h2 {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .card h2 .icon { font-size: 1.3rem; }

        /* Leaderboard Table */
        .leaderboard-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }

        .leaderboard-table th,
        .leaderboard-table td {
            padding: 0.6rem 0.8rem;
            text-align: center;
            border-bottom: 1px solid var(--border);
        }

        .leaderboard-table th {
            color: var(--text-secondary);
            font-weight: 500;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .leaderboard-table td:first-child {
            text-align: left;
            font-weight: 600;
        }

        .leaderboard-table tr:hover {
            background: rgba(59,130,246,0.08);
        }

        .score-good { color: var(--accent-green); font-weight: 600; }
        .score-mid { color: var(--accent-orange); font-weight: 600; }
        .score-bad { color: var(--accent-red); font-weight: 600; }

        .agent-badge {
            display: inline-block;
            padding: 0.15rem 0.5rem;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .badge-rule { background: rgba(156,163,175,0.2); color: #9ca3af; }
        .badge-react { background: rgba(59,130,246,0.2); color: #3b82f6; }
        .badge-ppo { background: rgba(139,92,246,0.2); color: #8b5cf6; }
        .badge-gnn { background: rgba(16,185,129,0.2); color: #10b981; }
        .badge-hrl { background: rgba(245,158,11,0.2); color: #f59e0b; }
        .badge-reflexion { background: rgba(236,72,153,0.2); color: #ec4899; }

        /* Chart containers */
        .chart-container {
            position: relative;
            height: 300px;
        }

        /* Graph container */
        #graph-container {
            width: 100%;
            height: 400px;
            border-radius: 8px;
            overflow: hidden;
            background: rgba(0,0,0,0.2);
        }

        #graph-container svg { width: 100%; height: 100%; }

        .graph-node circle {
            stroke: var(--border);
            stroke-width: 2;
            cursor: pointer;
            transition: r 0.2s;
        }

        .graph-node:hover circle { r: 12; }

        .graph-node text {
            fill: var(--text-primary);
            font-size: 9px;
            font-weight: 500;
            text-anchor: middle;
            pointer-events: none;
        }

        .graph-link {
            stroke: rgba(59,130,246,0.3);
            stroke-width: 1.5;
            marker-end: url(#arrowhead);
        }

        /* Stats */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .stat-item {
            text-align: center;
            padding: 1rem;
            background: rgba(255,255,255,0.03);
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 700;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stat-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 0.25rem;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 2rem;
            color: var(--text-secondary);
        }

        .loading::after {
            content: '';
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid var(--border);
            border-top-color: var(--accent-blue);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-left: 0.5rem;
            vertical-align: middle;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* Responsive */
        @media (max-width: 900px) {
            .container { grid-template-columns: 1fr; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🎓 EduPath AI — Training Dashboard</h1>
        <div class="status" id="status">Live</div>
    </div>

    <div class="container">
        <!-- Stats Overview -->
        <div class="card full-width">
            <div class="stats-grid">
                <div class="stat-item">
                    <div class="stat-value" id="stat-agents">6</div>
                    <div class="stat-label">Agent Types</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="stat-tasks">5</div>
                    <div class="stat-label">Tasks</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="stat-topics">32</div>
                    <div class="stat-label">Topics</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="stat-best">—</div>
                    <div class="stat-label">Best Avg Score</div>
                </div>
            </div>
        </div>

        <!-- Agent Leaderboard -->
        <div class="card full-width">
            <h2><span class="icon">🏆</span> Agent Leaderboard</h2>
            <table class="leaderboard-table" id="leaderboard">
                <thead>
                    <tr>
                        <th>Agent</th>
                        <th>Task 1</th>
                        <th>Task 2</th>
                        <th>Task 3</th>
                        <th>Task 4</th>
                        <th>Task 5</th>
                        <th>Average</th>
                    </tr>
                </thead>
                <tbody id="leaderboard-body">
                    <tr><td colspan="7" class="loading">Loading metrics</td></tr>
                </tbody>
            </table>
        </div>

        <!-- Learning Curve Chart -->
        <div class="card">
            <h2><span class="icon">📈</span> PPO Training Curve</h2>
            <div class="chart-container">
                <canvas id="training-chart"></canvas>
            </div>
        </div>

        <!-- Reward Distribution -->
        <div class="card">
            <h2><span class="icon">🎯</span> Reward Distribution</h2>
            <div class="chart-container">
                <canvas id="reward-chart"></canvas>
            </div>
        </div>

        <!-- Curriculum Graph -->
        <div class="card full-width">
            <h2><span class="icon">🗺️</span> Curriculum Prerequisite Graph</h2>
            <div id="graph-container"></div>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin;

        const AGENT_CONFIG = {
            'rule': { name: 'Rule-Based', badge: 'badge-rule' },
            'react': { name: 'LLM ReAct', badge: 'badge-react' },
            'ppo': { name: 'PPO (MLP)', badge: 'badge-ppo' },
            'gnn': { name: 'PPO-GNN', badge: 'badge-gnn' },
            'hrl': { name: 'HRL', badge: 'badge-hrl' },
            'reflexion': { name: 'Reflexion', badge: 'badge-reflexion' },
        };

        const FIELD_COLORS = {
            tech: '#3b82f6',
            healthcare: '#10b981',
            business: '#f59e0b',
            law: '#8b5cf6',
            design: '#ec4899',
        };

        // Score formatting
        function scoreClass(score) {
            if (score >= 0.7) return 'score-good';
            if (score >= 0.4) return 'score-mid';
            return 'score-bad';
        }

        function fmt(score) {
            return `<span class="${scoreClass(score)}">${score.toFixed(3)}</span>`;
        }

        // Load metrics and populate dashboard
        async function loadMetrics() {
            try {
                const resp = await fetch(`${API_BASE}/api/metrics`);
                const data = await resp.json();
                populateLeaderboard(data);
                populateTrainingChart(data);
                populateRewardChart(data);
            } catch (e) {
                console.error('Failed to load metrics:', e);
                populateDemoData();
            }
        }

        function populateDemoData() {
            // Demo data when no real results are available
            const demo = {
                'rule': [0.72, 0.55, 0.38, 0.40, 0.025],
                'react': [0.85, 0.72, 0.55, 0.48, 0.15],
                'ppo': [0.80, 0.65, 0.42, 0.38, 0.10],
                'gnn': [0.88, 0.78, 0.58, 0.52, 0.20],
                'hrl': [0.90, 0.82, 0.62, 0.55, 0.25],
                'reflexion': [0.87, 0.80, 0.60, 0.50, 0.22],
            };

            const tbody = document.getElementById('leaderboard-body');
            tbody.innerHTML = '';

            let bestAvg = 0;
            Object.entries(demo).forEach(([agent, scores]) => {
                const avg = scores.reduce((a, b) => a + b) / scores.length;
                if (avg > bestAvg) bestAvg = avg;
                const config = AGENT_CONFIG[agent];
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td><span class="agent-badge ${config.badge}">${config.name}</span></td>
                    ${scores.map(s => `<td>${fmt(s)}</td>`).join('')}
                    <td>${fmt(avg)}</td>
                `;
                tbody.appendChild(row);
            });

            document.getElementById('stat-best').textContent = bestAvg.toFixed(3);

            // Demo training chart
            createDemoChart();
        }

        function populateLeaderboard(data) {
            const evalData = data.evaluation_results || {};
            const ablation = data.ablation_results;

            if (!ablation && Object.keys(evalData).length === 0) {
                populateDemoData();
                return;
            }

            // Use ablation data if available
            if (ablation && ablation.results) {
                const tbody = document.getElementById('leaderboard-body');
                tbody.innerHTML = '';
                const tasks = ['task1_easy', 'task2_medium', 'task3_hard', 'task4_team', 'task5_deadline'];

                let bestAvg = 0;
                Object.entries(ablation.results).forEach(([agent, taskScores]) => {
                    const scores = tasks.map(t => taskScores[t] || 0);
                    const avg = scores.reduce((a, b) => a + b) / scores.length;
                    if (avg > bestAvg) bestAvg = avg;
                    const config = AGENT_CONFIG[agent] || { name: agent, badge: 'badge-rule' };
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td><span class="agent-badge ${config.badge}">${config.name}</span></td>
                        ${scores.map(s => `<td>${fmt(s)}</td>`).join('')}
                        <td>${fmt(avg)}</td>
                    `;
                    tbody.appendChild(row);
                });

                document.getElementById('stat-best').textContent = bestAvg.toFixed(3);
            } else {
                populateDemoData();
            }
        }

        function populateTrainingChart(data) {
            const curves = data.learning_curves || {};
            const datasets = [];
            const colors = ['#3b82f6', '#8b5cf6', '#10b981', '#f59e0b', '#ef4444'];

            let idx = 0;
            Object.entries(curves).forEach(([name, curve]) => {
                const rewards = curve.episode_rewards || (curve[Object.keys(curve)[0]] || {}).episode_rewards;
                if (rewards && rewards.length > 0) {
                    datasets.push({
                        label: name.replace('learning_curve_', '').replace('.json', ''),
                        data: rewards.map((r, i) => ({ x: i, y: r })),
                        borderColor: colors[idx % colors.length],
                        backgroundColor: 'transparent',
                        tension: 0.3,
                        pointRadius: 0,
                        borderWidth: 2,
                    });
                    idx++;
                }
            });

            if (datasets.length === 0) return;

            new Chart(document.getElementById('training-chart'), {
                type: 'line',
                data: { datasets },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { labels: { color: '#9ca3af', font: { size: 11 } } }
                    },
                    scales: {
                        x: { title: { display: true, text: 'Episode', color: '#9ca3af' },
                             ticks: { color: '#6b7280' }, grid: { color: 'rgba(255,255,255,0.05)' } },
                        y: { title: { display: true, text: 'Reward', color: '#9ca3af' },
                             ticks: { color: '#6b7280' }, grid: { color: 'rgba(255,255,255,0.05)' } }
                    }
                }
            });
        }

        function populateRewardChart(data) {
            createDemoRewardChart();
        }

        function createDemoChart() {
            const episodes = Array.from({ length: 50 }, (_, i) => i);
            const rewards = episodes.map(i => -2 + (4 * i / 50) + (Math.random() - 0.5) * 1.5);

            new Chart(document.getElementById('training-chart'), {
                type: 'line',
                data: {
                    labels: episodes,
                    datasets: [{
                        label: 'PPO Training Reward',
                        data: rewards,
                        borderColor: '#3b82f6',
                        backgroundColor: 'rgba(59,130,246,0.1)',
                        fill: true,
                        tension: 0.4,
                        pointRadius: 0,
                        borderWidth: 2,
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { labels: { color: '#9ca3af' } } },
                    scales: {
                        x: { ticks: { color: '#6b7280' }, grid: { color: 'rgba(255,255,255,0.05)' } },
                        y: { ticks: { color: '#6b7280' }, grid: { color: 'rgba(255,255,255,0.05)' } }
                    }
                }
            });
        }

        function createDemoRewardChart() {
            const agents = ['Rule', 'ReAct', 'PPO', 'GNN', 'HRL', 'Reflexion'];
            const avgRewards = [1.2, 2.8, 2.1, 3.5, 3.8, 3.2];

            new Chart(document.getElementById('reward-chart'), {
                type: 'bar',
                data: {
                    labels: agents,
                    datasets: [{
                        label: 'Avg Episode Reward',
                        data: avgRewards,
                        backgroundColor: [
                            'rgba(156,163,175,0.6)',
                            'rgba(59,130,246,0.6)',
                            'rgba(139,92,246,0.6)',
                            'rgba(16,185,129,0.6)',
                            'rgba(245,158,11,0.6)',
                            'rgba(236,72,153,0.6)',
                        ],
                        borderColor: [
                            '#9ca3af', '#3b82f6', '#8b5cf6',
                            '#10b981', '#f59e0b', '#ec4899',
                        ],
                        borderWidth: 2,
                        borderRadius: 6,
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { ticks: { color: '#9ca3af' }, grid: { display: false } },
                        y: { ticks: { color: '#6b7280' }, grid: { color: 'rgba(255,255,255,0.05)' },
                             title: { display: true, text: 'Avg Reward', color: '#9ca3af' } }
                    }
                }
            });
        }

        // Curriculum Graph (D3.js)
        async function loadGraph() {
            try {
                const resp = await fetch(`${API_BASE}/api/graph`);
                const data = await resp.json();
                if (data.nodes && data.nodes.length > 0) {
                    renderGraph(data);
                } else {
                    document.getElementById('graph-container').innerHTML =
                        '<p style="text-align:center;padding:2rem;color:#9ca3af">Connect to dashboard server for live graph</p>';
                }
            } catch (e) {
                document.getElementById('graph-container').innerHTML =
                    '<p style="text-align:center;padding:2rem;color:#9ca3af">Dashboard server not running. Start with: python dashboard/server.py</p>';
            }
        }

        function renderGraph(data) {
            const container = document.getElementById('graph-container');
            const width = container.clientWidth;
            const height = 400;

            const svg = d3.select('#graph-container')
                .append('svg')
                .attr('viewBox', `0 0 ${width} ${height}`);

            // Arrow marker
            svg.append('defs').append('marker')
                .attr('id', 'arrowhead')
                .attr('viewBox', '0 -5 10 10')
                .attr('refX', 20)
                .attr('refY', 0)
                .attr('markerWidth', 6)
                .attr('markerHeight', 6)
                .attr('orient', 'auto')
                .append('path')
                .attr('d', 'M0,-5L10,0L0,5')
                .attr('fill', 'rgba(59,130,246,0.5)');

            const simulation = d3.forceSimulation(data.nodes)
                .force('link', d3.forceLink(data.links).id(d => d.id).distance(80))
                .force('charge', d3.forceManyBody().strength(-200))
                .force('center', d3.forceCenter(width / 2, height / 2))
                .force('collision', d3.forceCollide(25));

            const link = svg.selectAll('.graph-link')
                .data(data.links)
                .join('line')
                .attr('class', 'graph-link');

            const node = svg.selectAll('.graph-node')
                .data(data.nodes)
                .join('g')
                .attr('class', 'graph-node')
                .call(d3.drag()
                    .on('start', (event, d) => {
                        if (!event.active) simulation.alphaTarget(0.3).restart();
                        d.fx = d.x; d.fy = d.y;
                    })
                    .on('drag', (event, d) => { d.fx = event.x; d.fy = event.y; })
                    .on('end', (event, d) => {
                        if (!event.active) simulation.alphaTarget(0);
                        d.fx = null; d.fy = null;
                    })
                );

            node.append('circle')
                .attr('r', d => 6 + d.difficulty)
                .attr('fill', d => FIELD_COLORS[d.field] || '#6b7280');

            node.append('text')
                .attr('dy', -14)
                .text(d => d.name.length > 15 ? d.name.substring(0, 15) + '…' : d.name);

            simulation.on('tick', () => {
                link.attr('x1', d => d.source.x).attr('y1', d => d.source.y)
                    .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
                node.attr('transform', d => `translate(${d.x},${d.y})`);
            });
        }

        // Initialize
        loadMetrics();
        loadGraph();

        // Auto-refresh every 30 seconds
        setInterval(loadMetrics, 30000);
    </script>
</body>
</html>
